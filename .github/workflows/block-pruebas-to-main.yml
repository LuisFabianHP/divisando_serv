name: Block pruebas PR to main

on:
  pull_request:
    branches:
      - main

jobs:
  block-pruebas:
    runs-on: ubuntu-latest
    steps:
      - name: Block pruebas as source branch
        run: |
          echo "PR source branch: ${{ github.head_ref }}"
          if [ "${{ github.head_ref }}" = "pruebas" ]; then
            echo "Direct PR from 'pruebas' to 'main' is blocked. Promote changes from 'dev-api-task'."
            exit 1
          fi